<template>
    <lightning-card>
        <div class="slds-p-around_medium slds-align_absolute-center">
            <lightning-button
                label="Nouvelle saisie de temps"
                icon-name="utility:add"
                icon-position="left"
                onclick={openFlow}>
            </lightning-button>
        </div>

        <template if:true={showFlow}>
            <lightning-flow
                flow-api-name="Cr_er_Saisie_de_temps"
                flow-input-variables={flowInputVariables}
                onstatuschange={handleStatusChange}>
            </lightning-flow>
        </template>
    </lightning-card>
</template>
